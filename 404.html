<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sahifa topilmadi — TDShU</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body {
            background: linear-gradient(135deg, var(--primary-blue), var(--dark-blue));
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            color: white;
            text-align: center;
        }
        .nf-box { max-width: 520px; }
        .nf-code { font-size: 110px; font-weight: 800; line-height: 1; opacity: 0.9; }
        .nf-box h1 { font-size: 26px; margin: 10px 0 14px; }
        .nf-box p { opacity: 0.9; margin-bottom: 28px; line-height: 1.6; }
        .nf-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: white;
            color: var(--primary-blue);
            padding: 13px 26px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 700;
            transition: transform 0.2s;
        }
        .nf-btn:hover { transform: translateY(-2px); }
    </style>
</head>
<body>
    <div class="nf-box">
        <div class="nf-code">404</div>
        <h1>Sahifa topilmadi</h1>
        <p>Kechirasiz, siz qidirgan sahifa mavjud emas yoki ko'chirilgan bo'lishi mumkin.</p>
        <a class="nf-btn" href="index.html"><i class="fas fa-home"></i> Bosh sahifaga qaytish</a>
    </div>
</body>
</html>
