# Netlify konfiguratsiyasi — frontend uchun
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."

# Topilmagan sahifalar uchun 404.html avtomatik ko'rsatiladi (redirect kerak emas).

# Backend manba kodi frontend domenida ochilmasin (Render'da alohida ishlaydi)
[[redirects]]
  from = "/backend/*"
  to = "/404.html"
  status = 404

# Xavfsizlik sarlavhalari
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# Rasm va statik fayllar uchun kesh
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
