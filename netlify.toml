# Netlify konfiguratsiyasi — frontend uchun
# https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  publish = "."

# 404 sahifasi: index.html ga qaytarsin (SPA emas, lekin xato bo'lsa bosh sahifa)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Xavfsizlik sarlavhalari
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Rasm va statik fayllar uchun kesh
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
